name: log-rotation-daily

# Runs once a day. Deletes pipeline run logs older than the retention window
# (defaults to 50 days in config/pipeline.yml) and commits the deletion
# back to the repo. The auto-commit uses [skip ci] so it does not chain
# trigger other workflows.

on:
  schedule:
    - cron: '15 5 * * *'   # 05:15 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pyyaml

      - name: Rotate logs
        env:
          PYTHONPATH: .
        run: |
          python -m maintenance.log_rotation

      - name: Commit deletions back to repo
        if: always()
        run: |
          set -euo pipefail
          git config user.name  "tickstream-bot"
          git config user.email "bot@tickstream.local"
          git add logs/runs/ || true
          if git diff --cached --quiet; then
            echo "No log files were deleted this run."
            exit 0
          fi
          git commit -m "chore(logs): rotate logs/runs/ older than retention window [skip ci]"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
