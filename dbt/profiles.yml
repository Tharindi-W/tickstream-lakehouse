tickstream:
  target: dev
  outputs:
    dev:
      type:       databricks
      host:       "{{ env_var('DATABRICKS_HOST_BARE') }}"
      http_path:  "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token:      "{{ env_var('DATABRICKS_TOKEN') }}"
      catalog:    workspace
      schema:     default
      threads:    4
      retries:    3
      connect_timeout: 60
